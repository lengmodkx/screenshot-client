<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>截图客户端</title>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(180deg, #f5f7fa 0%, #e4e8ec 100%);
  color: #333;
  min-height: 100vh;
  padding: 20px;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* 顶部状态栏 */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%);
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(46, 125, 50, 0.3);
  color: white;
}

.top-bar h1 {
  font-size: 20px;
  font-weight: 600;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  background: rgba(255,255,255,0.2);
  padding: 6px 14px;
  border-radius: 20px;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #81c784;
  box-shadow: 0 0 8px #81c784;
}

/* 主控制按钮 - 大大居中 */
.main-controls {
  display: flex;
  gap: 16px;
  padding: 24px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.btn-large {
  flex: 1;
  padding: 24px 32px;
  border: none;
  border-radius: 16px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.2s;
}

.btn-start {
  background: linear-gradient(135deg, #43a047 0%, #66bb6a 100%);
  color: white;
  box-shadow: 0 6px 20px rgba(67, 160, 71, 0.4);
}

.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(67, 160, 71, 0.5);
}

.btn-stop {
  background: linear-gradient(135deg, #e53935 0%, #ef5350 100%);
  color: white;
  box-shadow: 0 6px 20px rgba(229, 57, 53, 0.4);
}

.btn-capture {
  background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
  color: white;
  box-shadow: 0 6px 20px rgba(30, 136, 229, 0.4);
}

/* 副按钮区 - 简洁行 */
.secondary-controls {
  display: flex;
  gap: 12px;
}

.btn-small {
  flex: 1;
  padding: 14px 20px;
  border: 2px solid #c8e6c9;
  border-radius: 12px;
  background: white;
  font-size: 14px;
  font-weight: 500;
  color: #2e7d32;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
}

.btn-small:hover {
  background: #f1f8e9;
  border-color: #43a047;
}

/* 信息展示区 */
.info-section {
  background: white;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
}

.info-row:last-child {
  border-bottom: none;
}

.info-label {
  color: #757575;
  font-size: 14px;
}

.info-value {
  font-weight: 500;
  font-size: 14px;
}

/* 统计区 */
.stats-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.stat-card {
  background: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}

.stat-number {
  font-size: 32px;
  font-weight: 700;
  color: #2e7d32;
}

.stat-label {
  font-size: 13px;
  color: #81c784;
  margin-top: 6px;
}

/* 预览区 */
.preview-section {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.preview-header {
  padding: 14px 20px;
  background: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
  font-size: 14px;
  font-weight: 600;
  color: #2e7d32;
}

.preview-body {
  padding: 20px;
}

.preview-image {
  height: 180px;
  background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #bdbdbd;
}

.status-text {
  margin-top: 14px;
  padding: 12px;
  background: #f1f8e9;
  border-radius: 10px;
  text-align: center;
  color: #43a047;
  font-size: 13px;
}
  </style>
</head>
<body>
  <div class="app">
    <!-- 顶部状态栏 -->
    <div class="top-bar">
      <h1>截图客户端</h1>
      <div class="status-badge">
        <span class="status-dot"></span>
        <span>在线</span>
      </div>
    </div>

    <!-- 主控制按钮 - 大大居中 -->
    <div class="main-controls">
      <button class="btn-large btn-stop">■ 停止</button>
      <button class="btn-large btn-capture">📷 截图</button>
    </div>

    <!-- 副按钮 -->
    <div class="secondary-controls">
      <button class="btn-small">⚙️ 设置</button>
      <button class="btn-small">🚪 登出</button>
    </div>

    <!-- 信息 -->
    <div class="info-section">
      <div class="info-row">
        <span class="info-label">运行状态</span>
        <span class="info-value" style="color:#2e7d32">工作中</span>
      </div>
      <div class="info-row">
        <span class="info-label">存储模式</span>
        <span class="info-value">云端上传</span>
      </div>
      <div class="info-row">
        <span class="info-label">截图间隔</span>
        <span class="info-value">10 秒</span>
      </div>
      <div class="info-row">
        <span class="info-label">登录用户</span>
        <span class="info-value">admin</span>
      </div>
    </div>

    <!-- 统计 -->
    <div class="stats-section">
      <div class="stat-card">
        <div class="stat-number">42</div>
        <div class="stat-label">今日截图</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">14:32:05</div>
        <div class="stat-label">最后截图</div>
      </div>
    </div>

    <!-- 预览 -->
    <div class="preview-section">
      <div class="preview-header">🖼️ 最新截图</div>
      <div class="preview-body">
        <div class="preview-image">[截图预览]</div>
        <div class="status-text">已上传 - 14:32:05</div>
      </div>
    </div>
  </div>
</body>
</html>
